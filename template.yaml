AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: twilio-front-transcribe2 backend (Lambda + API Gateway)

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  FunctionName:
    Type: String
    Default: TwilioCustomProxy-Transcribe
  StageName:
    Type: String
    Default: dev
  TranscribeTableName:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /dynamodb/main-table
  TranscribeLogsIndexName:
    Type: String
    Default: ManagementScreenIndexV2
  TranscribeExportBucket:
    Type: String
    Default: transcribe-csv
  TranscribeExportUrlExpires:
    Type: Number
    Default: 900

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64

Resources:
  TwilioCustomProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Ref FunctionName
      CodeUri: lambda/TwilioCustomProxy-Transcribe/
      Handler: lambda_function.lambda_handler
      Role: !GetAtt TwilioCustomProxyFunctionRole.Arn
      Environment:
        Variables:
          MAIN_TABLE: !Ref TranscribeTableName
          TABLE_INDEX: !Ref TranscribeLogsIndexName
          EXPORT_BUCKET: !Ref TranscribeExportBucket
          EXPORT_URL_EXPIRES: !Ref TranscribeExportUrlExpires

  TwilioCustomProxyFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: TwilioCustomProxy-Transcribe
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: TwilioCustomProxyTranscribeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: DynamoRead
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                Resource:
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TranscribeTableName}'
                  - !Sub 'arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TranscribeTableName}/index/${TranscribeLogsIndexName}'
              - Sid: S3Export
                Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource: !Sub 'arn:aws:s3:::${TranscribeExportBucket}/*'

Outputs:
  FunctionArn:
    Description: Lambda ARN
    Value: !GetAtt TwilioCustomProxyFunction.Arn
